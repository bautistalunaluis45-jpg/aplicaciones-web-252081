<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            <div class="form-logo">
                <img src="/imgs/nebula-03.svg" alt="Logo Nébula">
            </div>

            <div class="form-header">
                <h3>Crear cuenta</h3>
            </div>

            <form class="auth-form" method="post" action="/crear-cuenta">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" minlength="8" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="user">Pseudónimo</label>
                    <input type="text" id="user" name="user" pattern="[A-Za-z]{3,10}-[0-9]{2,10}" title="Usa letras de 3 a 10, un guion y números de 2 a 10" required>
                </div>

                <div class="form-group">
                    <label>Género</label>
                    <div class="radio-group">
                        <input type="radio" id="radio_femenino" name="rad_genero" value="Femenino" required>
                        <label for="radio_femenino">Femenino</label>
                        <input type="radio" id="radio_masculino" name="rad_genero" value="Masculino">
                        <label for="radio_masculino">Masculino</label>
                        <input type="radio" id="radio_otro" name="rad_genero" value="Otro">
                        <label for="radio_otro">Otro</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="sel_suscripcion">Tipo de suscripción</label>
                    <select name="sel_suscripcion" id="sel_suscripcion" required>
                        <option value="">Selecciona una opción</option>
                        <option value="gratis">Gratis</option>
                        <option value="premium_mensual">Premium Mensual ($99/mes)</option>
                        <option value="premium_anual">Premium Anual ($899/año)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="terminos" name="chk_terminos" value="aceptado" required>
                    <label for="terminos">Acepto los términos y condiciones</label>
                </div>

                <div class="form-group">
                    <label for="comentario">Comentarios</label>
                    <textarea id="comentario" name="comentarios" rows="4" placeholder="Cuéntanos de ti"></textarea>
                </div>

                <div>
                    <button type="submit" class="btn-primary">Crear cuenta</button>
                    <button type="reset" class="btn-secondary">Limpiar</button>
                </div>

                <p class="link">¿Ya tienes una cuenta?
                    <a href="/iniciar-sesion">Inicia sesión aquí</a>
                </p>
            </form>

        </section>
    </main>

    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
