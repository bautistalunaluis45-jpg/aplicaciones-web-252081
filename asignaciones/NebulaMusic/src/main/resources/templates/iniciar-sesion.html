<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Iniciar Sesión</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            <div class="form-logo">
                <img src="/imgs/nebula-03.svg" alt="Logo Nébula">
            </div>

            <div class="form-header">
                <h3>Iniciar sesión</h3>
            </div>

            <form method="post" action="/autenticacion">
                <div class="form-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="********" autocomplete="current-password" required>
                </div>

                <div>
                    <button type="submit" class="btn-primary">Iniciar sesión</button>
                    <button type="reset" class="btn-secondary">Limpiar</button>
                </div>

                <p class="link">¿Aún no tienes una cuenta?
                    <a href="/registro">Regístrate aquí</a>
                </p>


            </form>

        </section>
    </main>




    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
