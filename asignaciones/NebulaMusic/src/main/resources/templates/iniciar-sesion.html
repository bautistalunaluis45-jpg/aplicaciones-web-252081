<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Iniciar Sesión</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">

            <form method="post" action="/autenticacion" enctype="application/x-www-form-urlencoded">
                <h1>Iniciar Sesion</h1>
                <div>
                    <label for="correo">Correo Electronico</label>
                    <input type="email" id="correo" name="email" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="********" required>
                </div>

                <div>
                    <button type="submit">Iniciar Sesion</button>
                    <button type="reset">Limpiar</button>
                </div>

                <p>¿Aun no tienes una cuenta?
                    <a href="/registro">Registrate aquí</a>
                </p>


            </form>

        </section>
    </main>




    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
