<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            
            <!-- TAREA PARA EL ALUMNO:
                 Crea un formulario que envíe los datos mediante POST a "/crear-cuenta".
                 Debe contener campos para:
                 - Nombre completo (texto)
                 - Correo electrónico (email)
                 - Contraseña (password)
                 - Pseudónimo (texto con patrón de validación: [letras de 3 a 10]-[números de 2 a 10])
                 - Género (radio buttons: Femenino, Masculino, Otro)
                 - Tipo de Suscripción (select: Gratis, Premium Mensual, Premium Anual)
                 - Fecha de nacimiento (date)
                 - Aceptar términos y condiciones (checkbox)
                 - Comentarios adicionales o gustos (textarea)
            -->
            <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
                <h2>Crear Cuenta</h2>
                    <div>
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre">
                    </div>
                    <div>
                        <label for="email">Corre:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div>
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" minlength="8" required>
                    <div>
                        <label for="user">User:</label>
                        <input type="text" id="user" name="user" required pattern="[a-zA-Z]{3-10}-[0-9]{2,10}">
                    </div>

                    <div>
                        <label>Genero:</label>
                        <div>
                            <input type="radio" id="radio_femenino" name="radio_genero">
                            <label for="radio_femenino">Femenino</label>
                            <input type="radio" id="radio_masculino" name="radio_genero">
                            <label for="radio_masculino">Masculino</label>
                            <input type="radio" id="radio_otro" name="radio_genero">
                            <label for="radio_otro">Otro</label>

                        </div>
                    </div>

                    <div>
                        <label for="sel_suscripcion">Tipo Suscripcion:</label>
                        <select name="sel_suscripcion" id="sel_suscripcion">
                            <option value="">Selecciona una opcion</option>
                            <option value="gratis">Gratis</option>
                            <option value="premium_mensual">Premium Mensual ($99/mes)</option>
                            <option value="premium_anual">Premium Anual ($899/mes)</option>

                        </select>
                        
                    </div>

                    <div>
                        <label for="fechaNacimiento">Fecha de Nacimiento:</label>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                    </div>

                    <div>
                        <label for="comentario">Comentarios:</label>
                        <textarea id="comentario" name="comentario" rows="4" cols="40" PLACEHOLDER="Cuentanos de ti"> </textarea>
                    </div>

                    <div>
                        <input type="checkbox" id="terminos" name="chk_terminos" value="aceptado" required>
                        <label for="terminos">Acepto los terminos y condiciones</label>
                    </div>

                    <div>
                        <button type="submit">Crear cuenta</button>
                        <button type="reset">Limpiar</button>
                    </div>

                        <p>¿Ya tienes una cuenta?
                            <a href="iniciar-sesion.html">Inicia sesión aquí</a>
                        </p>
                    </div>


            </form>

        </section>
    </main>

    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
